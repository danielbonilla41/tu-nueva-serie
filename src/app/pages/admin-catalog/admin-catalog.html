<div class="admin-catalog-container">
  <header class="admin-header">
    <h1>Panel de Administración</h1>
    <p>Seleccione una plataforma para configurar o gestionar cuentas</p>
  </header>

  <div class="platform-grid">
    @for (platform of platforms(); track platform.id) {
      <div class="platform-card">
        <div class="icon-container">
          <img [src]="platform.iconUrl" [alt]="platform.name">
        </div>
        
        <div class="platform-info">
          <h3>{{ platform.name }}</h3>
          
          <div class="card-actions">
            <!-- Botón para ver el listado actual -->
            <button class="btn-action btn-manage" (click)="viewProfiles(platform.name, platform.id)">
              <span class="icon">⚙️</span> Gestionar
            </button>

            <!-- Botón para ir a la nueva vista de creación -->
            <button class="btn-action btn-create" [routerLink]="['/admin/create-account', platform.name, 'reference', platform.id]">
              <span class="icon">➕</span> Crear
            </button>
          </div>
        </div>
      </div>
    }
  </div>
</div>
